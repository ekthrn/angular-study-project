<div class="mt-6 flex flex-col gap-4 border-t border-slate-100 pt-4">
  <div class="flex items-center gap-4">
    <span class="text-xs font-medium text-rose-900/90 whitespace-nowrap">Искать по:</span>
    <div class="flex gap-2">
      @for (option of options; track option.id) {
        <button
          type="button"
          (click)="setFilter(option)"
          [class]="option.isSelected ? 'bg-rose-100 text-rose-700 border-rose-200' : 'bg-slate-50 text-slate-600 border-transparent'"
          class="px-4 py-2 text-xs font-bold rounded-xl transition-all border hover:bg-rose-50 hover:text-rose-700 active:scale-95">
          {{ option.label }}
        </button>
      }
    </div>
  </div>
  <div class="relative w-full max-w-md">
    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
      <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
    </div>
    <input
      type="text"
      (input)="setSearch($event)"
      placeholder="Поиск по {{ curLabel }}..."
      class="block w-full pl-10 pr-4 py-2 text-sm text-slate-700 bg-slate-50 border border-slate-100 rounded-xl focus:ring-2 focus:ring-rose-200 focus:border-rose-300 transition-all outline-none placeholder:text-slate-400"
    >
  </div>
</div>
